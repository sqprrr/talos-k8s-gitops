apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gitops
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-gitops
  template:
    metadata:
      labels:
        app: nginx-gitops
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gitops-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: nginx-gitops
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31155
